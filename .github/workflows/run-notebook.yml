name: Run Notebook

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  execute-notebook:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_pinned.txt
      - name: Execute notebook
        run: |
          pip install nbconvert nbclient
          jupyter nbconvert --to notebook --execute Environmental_Compliance_Analysis/Dwv.ipynb --ExecutePreprocessor.timeout=600 --output Dwv_executed.ipynb
      - name: Upload executed notebook
        uses: actions/upload-artifact@v4
        with:
          name: Dwv_executed
          path: Dwv_executed.ipynb
